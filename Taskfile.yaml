version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

### BUILD DEV

  dev-build-backend:
    desc: build backend side for develope
    cmds:
      - docker build -t self-dev-backend -f infra/Dockerfile.backend.dev .

  dev-build-frontend:
    desc: build frontend side for develope
    cmds:
      - docker build -t self-dev-frontend -f infra/Dockerfile.frontend.dev .

  dev-build:
    desc: build backend and frontend for develope
    cmds:
      - task dev-build-backend
      - task dev-build-frontend

### BUILD PROD

  prod-build-backend:
    desc: build backend side for production
    cmds:
      - docker build -t self-dev-backend -f infra/Dockerfile.backend.prod .
  
  prod-build-frontend:
    desc: build frontend side for production
    cmds:
      - docker build -t self-dev-frontend -f infra/Dockerfile.frontend.prod .

  prod-build:
    desc: build backend and frontend for production
    cmds:
      - task prod-build-backend
      - task prod-build-frontend

### COMPOSE (DEV)

  dev-up:
    desc: start all containers for develope with open backend ports and database
    cmds:
      - task dev-build
      - docker compose -f ./infra/docker-compose.dev.yaml up -d

  dev-down:
    desc: stop all containers 
    cmds:
      - docker compose -f ./infra/docker-compose.dev.yaml down

### COMPOSE (PROD)

  prod-up:
    desc: start all containers for production 
    cmds:
      - task prod-build
      - docker compose -f ./infra/docker-compose.prod.yaml up -d

  prod-down:
    desc: stop all containers 
    cmds:
      - docker compose -f ./infra/docker-compose.prod.yaml down

### LINTING

  lint:
    desc: formatting project
    cmds:
      - cd backend && go fmt ./...
      - cd backend && golangci-lint run --fix
      - cd frontend && npx prettier . --write


### DATABASE 

  migration:
    desc: create new migration file. example "task migration NAME=name_of_migration"
    cmds:
      - goose -s create {{.NAME}} sql -dir backend/migrations
    vars:
      NAME: '{{.NAME | default "migration"}}'

  migrate:
    desc: choose last version of migrations
    cmds:
      - goose up -env ./infra/.env

  migrate-one:
    desc: choose next version of migrations 
    cmds:
      - goose up-by-one -env ./infra/.env

  rollback:
    desc: roll back all migrations
    cmds:
      - goose reset -env ./infra/.env

  rollback-one:
    desc: comeback to previous version of migrations
    cmds:
      - goose down -env ./infra/.env

### LOGS

  logs-backend:
    desc: check logs in real time in backend container
    cmds:
      - docker logs -f self-dev-backend

  logs-frontend:
    desc: check logs in real time in frontend container
    cmds:
      - docker logs -f self-dev-frontend

### DEV

  dev-frontend:
    desc: up only frontend side of project and develope in real time
    cmds:
      - cd frontend && npm run dev
