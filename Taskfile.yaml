version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build-backend:
    desc: build backend side
    cmds:
      - docker build -t self-dev-backend -f infra/Dockerfile.backend .

  build-frontend:
    desc: build frontend side
    cmds:
      - docker build -t self-dev-frontend -f infra/Dockerfile.frontend .

  dev-frontend:
    desc: up only frontend side of project and develope in real time
    cmds:
      - cd frontend && npm run dev

  up:
    desc: start service
    cmds:
      - task build-backend
      - task build-frontend
      - docker-compose -f ./infra/docker-compose.yaml up -d

  down:
    desc: stop service
    cmds:
      - docker-compose -f ./infra/docker-compose.yaml down

  lint:
    desc: formatting project
    cmds:
      - cd backend && go fmt ./...
      - cd backend && golangci-lint run --fix
      - cd frontend && npx prettier . --write

  migration:
    desc: create new migration file. example "task migration NAME=name_of_migration"
    cmds:
      - goose -s create {{.NAME}} sql -dir backend/migrations
    vars:
      NAME: '{{.NAME | default "migration"}}'

  migrate:
    desc: choose last version of migrations
    cmds:
      - goose up -env ./infra/.env

  rollback:
    desc: comeback to previous version of migrations
    cmds:
      - goose down -env ./infra/.env

  logs-backend:
    desc: check logs in real time in backend
    cmds:
      - docker logs -f self-dev-backend
