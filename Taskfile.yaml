version: '3'

tasks:

  run-backend:
    desc: start service
    cmds:
      - cd backend && docker build -t self-dev-backend .
      - docker run --rm -d --name=self-dev-backend --network=self-dev -p=8080:8080 self-dev-backend
    silent: true
  
  run-frontend:
    desc: start frontend
    cmds:
      - cd frontend && docker build -t self-dev-frontend .
      - docker run --rm -d --name=self-dev-frontend --network=self-dev -p=5173:5173 self-dev-frontend

  stop:
    desc: stop service
    cmds:
      - docker stop self-dev-backend
      - docker stop self-dev-frontend
    silent: true

  fmt:
    desc: formatting project
    cmds:
      - golangci-lint fmt
    silent: true      