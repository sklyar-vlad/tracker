basePath: /api
definitions:
  dto.CreateUserRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      password:
        type: string
      user_id:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: sklyarvladislavtl@gmail.com
    name: API Support
    url: t.me/sklyarvlad
  description: This is a server of self-dev tracker.
  title: Swagger SelfDev API
  version: "1.0"
paths:
  /register:
    post:
      consumes:
      - application/json
      description: Creates a new user account
      parameters:
      - description: User data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Register new user
      tags:
      - user
swagger: "2.0"
