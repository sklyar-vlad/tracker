<!doctype html>
<html>
  <body style="margin:0; padding:0; font-family: Arial, sans-serif; background:#0b0f1a;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
      <tr>
        <td align="center">

          <!-- CARD -->
          <table width="420" cellpadding="0" cellspacing="0" style="background:#111827; border-radius:14px; padding:32px;">

            <div style="text-align:center; padding-bottom:20px;">
              <span style="
                font-size:52px;
                font-weight:700;
                font-family:Arial, sans-serif;
                color:#ffffff;
              ">
                <span style="color:#ffffff;">{Self}</span>
                <span style="color:#95a2df;">/</span>
                <span style="color:#95a2df;">Dev</span>
              </span>
            </div>

            <tr>
              <td style="text-align:center;">
                <h2 style="color:#ffffff; margin:0 0 10px 0;">
                  Confirm your email
                </h2>

                <p style="color:#9ca3af; margin:0 0 24px 0;">
                  Click the button below to verify your account
                </p>
              </td>
            </tr>

            <!-- BUTTON -->
            <tr>
              <td align="center" style="padding:20px 0;">
                <a href="{{.VerifyURL}}"
                   style="
                     background:linear-gradient(135deg,#95a2df,#3b82f6);
                     color:white;
                     padding:12px 24px;
                     text-decoration:none;
                     border-radius:10px;
                     font-weight:bold;
                     display:inline-block;
                   ">
                  Verify email
                </a>
              </td>
            </tr>

            <tr>
              <td style="text-align:center; padding-top:10px;">
                <p style="color:#6b7280; font-size:12px; margin:0;">
                  If you didn’t create an account, ignore this email.
                </p>
              </td>
            </tr>

          </table>

        </td>
      </tr>
    </table>
  </body>
</html>
